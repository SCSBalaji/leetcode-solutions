name: Deploy Review Site

# Builds the review-site/ React app and deploys it to GitHub Pages
# whenever its source changes. Mirrors update-stats.yml's push-triggered
# pattern, but deploys to Pages instead of committing back to the repo.
on:
  push:
    branches: [main, master]
    paths:
      - 'review-site/**'
  # Lets you trigger a redeploy manually from the Actions tab without
  # needing to push a dummy commit — useful right after changing DNS
  # or Pages settings, when nothing in review-site/ actually changed.
  workflow_dispatch:

# GitHub Pages deployments need these specific permissions: read the
# repo content, and write to the special "pages" deployment target
# (not the repo's regular contents — this doesn't create a git commit).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment should run at a time. If a second push
# lands while the first deploy is still running, let the first one
# finish rather than cancelling it mid-deploy — cancelling here could
# leave Pages serving a half-deployed build.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: review-site/package-lock.json

      - name: Install dependencies
        working-directory: review-site
        run: npm ci

      - name: Build
        working-directory: review-site
        run: npm run build

      - name: Add CNAME for custom domain
        # index.html and the built assets land in review-site/dist/.
        # GitHub Pages needs a CNAME file (containing just the domain,
        # nothing else) inside the deployed output itself, not just
        # sitting in the repo, or it won't recognize the custom subdomain
        # on this specific deployment.
        run: echo "review.scsbalaji.tech" > review-site/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: review-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4